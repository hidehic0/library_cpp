name: auto update nix flake
on:
  schedule:
    - cron: "0 */12 * * *"
  push:
    branches: [nixos]
    paths:
      - ".github/workflows/update-nix-flake.yaml"
permissions:
  contents: write
jobs:
  update-nix-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: "Import GPG key"
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          fingerprint: 487F026936540E5D76FF712A6201116F67AD6FAC
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix flake update
      - uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_author: "hidehic0 <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: hidehic0
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          commit_message: "chore(deps): updated flake.lock"
          pull: true
